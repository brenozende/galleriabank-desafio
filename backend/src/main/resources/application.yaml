spring:
  application:
    name: desafio-galleriabank
  datasource:
    url: jdbc:h2:mem:galleriabank;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
jwt:
  secret: ${JWT_SECRET:galleria-bank-jwt-secret-key-32-chars}

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/galleriabank}
    username: ${DATABASE_USERNAME:galleriabank}
    password: ${DATABASE_PASSWORD:galleriabank}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
