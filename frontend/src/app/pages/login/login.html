<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
      <mat-card-subtitle>Acesse o painel de pedidos</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="login()" novalidate>
        <mat-form-field appearance="outline">
          <mat-label>Usuário</mat-label>
          <input matInput id="username" type="text" formControlName="username" autocomplete="username" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput id="password" type="password" formControlName="password" autocomplete="current-password" />
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit">Entrar</button>
      </form>

      <div class="divider">ou</div>

      <form [formGroup]="registerForm" (ngSubmit)="register()" novalidate>
        <h3>Criar conta</h3>

        <mat-form-field appearance="outline">
          <mat-label>Nome</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Usuário</mat-label>
          <input matInput formControlName="username" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="password" />
        </mat-form-field>

        <button mat-flat-button color="accent" type="submit">Cadastrar e entrar</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
